<!DOCTYPE html>
<html>
<head>
    <title>Slam Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Slam Book </h1>

    <form action="result.html" method="GET" onsubmit="return validateForm()">

        <div class="input-box">
            <label>Full Name</label>
            <input type="text" name="name" id="name" placeholder="Enter your name">
        </div>

        <div class="input-box">
            <label>Age</label>
            <input type="number" name="age" id="age" placeholder="Enter your age">
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" name="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-box">
            <label>Contact</label>
            <input type="text" name="contact" id="contact" placeholder="Phone number">
        </div>

        <div class="input-box">
            <label>Address</label>
            <textarea name="address" id="address" placeholder="Your address"></textarea>
        </div>

        <div class="input-box">
            <label>Date of Birth</label>
            <input type="date" name="dob" id="dob">
        </div>

        <div class="input-box">
            <label>Favorite Color</label>
            <input type="color" name="color" id="color">
        </div>

        <div class="input-box">
            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="Male"> Male</label>
                <label><input type="radio" name="gender" value="Female"> Female</label>
                <label><input type="radio" name="gender" value="Other"> Other</label>
            </div>
        </div>

        <div class="input-box">
            <label>Hobbies</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="hobby" value="Reading"> Reading</label>
                <label><input type="checkbox" name="hobby" value="Gaming"> Gaming</label>
                <label><input type="checkbox" name="hobby" value="Travel"> Travel</label>
            </div>
        </div>

        <div class="input-box">
            <label>Social Media</label>
            <select name="social" id="social">
                <option value="">Select</option>
                <option>Instagram</option>
                <option>Facebook</option>
                <option>LinkedIn</option>
                <option>Snapchat</option>
                <option>X</option>
            </select>
        </div>

        <div class="input-box">
            <label>Tell Me Something About You</label>
            <textarea name="about" id="about"></textarea>
        </div>

        <div class="input-box">
            <label>Signature</label>
            <input type="text" name="sign" id="sign">
        </div>

        <button type="submit"> Submit</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
