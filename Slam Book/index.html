<!DOCTYPE html>
<html>
<head>
    <title>Slam Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Slam Book Form</h1>

<form action="result.html" method="GET" onsubmit="return validateForm()">

    <label>Name:</label>
    <input type="text" name="name" id="name"><br>

    <label>Age:</label>
    <input type="number" name="age" id="age"><br>

    <label>Email:</label>
    <input type="email" name="email" id="email"><br>

    <label>Contact:</label>
    <input type="text" name="contact" id="contact"><br>

    <label>Address:</label>
    <textarea name="address" id="address"></textarea><br>

    <label>Date of Birth:</label>
    <input type="date" name="dob" id="dob"><br>

    <label>Favorite Color:</label>
    <input type="color" name="color" id="color"><br>

    <label>Gender:</label>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other
    <br>

    <label>Hobbies:</label>
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Gaming"> Gaming
    <input type="checkbox" name="hobby" value="Travel"> Travel
    <br>

    <label>Social Media:</label>
    <select name="social" id="social">
        <option value="">Select</option>
        <option>Instagram</option>
        <option>Facebook</option>
        <option>LinkedIn</option>
        <option>Snapchat</option>
        <option>X</option>
    </select><br>

    <label>Tell me something:</label>
    <textarea name="about" id="about"></textarea><br>

    <label>Signature:</label>
    <input type="text" name="sign" id="sign"><br>

    <button type="submit">Submit</button>

</form>

<script src="script.js"></script>
</body>
</html>
