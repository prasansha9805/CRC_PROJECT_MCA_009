<!DOCTYPE html>
<html>
<head>
    <title>Slam Book Result</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .card {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        p {
            margin: 6px 0;
        }

        a {
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2> Slam Book Entry </h2>
    <div id="result"></div>
</div>

<script>

const p = new URLSearchParams(window.location.search);


let hobbies = p.getAll("hobby");

document.getElementById("result").innerHTML = `
<p><b>Name:</b> ${p.get("name")}</p>
<p><b>Age:</b> ${p.get("age")}</p>
<p><b>Email:</b> ${p.get("email")}</p>
<p><b>Contact:</b> ${p.get("contact")}</p>
<p><b>Address:</b> ${p.get("address")}</p>
<p><b>DOB:</b> ${p.get("dob")}</p>
<p><b>Favorite Color:</b> ${p.get("color")}</p>
<p><b>Gender:</b> ${p.get("gender")}</p>
<p><b>Hobbies:</b> ${hobbies.join(", ")}</p>

<p><b>Instagram:</b> 
<a href="${p.get("instagram")}" target="_blank">Open</a></p>

<p><b>LinkedIn:</b> 
<a href="${p.get("linkedin")}" target="_blank">Open</a></p>

<p><b>X:</b> 
<a href="${p.get("x")}" target="_blank">Open</a></p>

<p><b>Facebook:</b> 
<a href="${p.get("facebook")}" target="_blank">Open</a></p>

<p><b>Snapchat:</b> 
<a href="${p.get("snapchat")}" target="_blank">Open</a></p>

<p><b>About:</b> ${p.get("about")}</p>
<p><b>Signature:</b> ${p.get("sign")}</p>
`;

</script>

</body>
</html>
